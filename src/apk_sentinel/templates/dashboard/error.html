{% extends "dashboard/base.html" %}

{% block title %}{{ code }} - APK Sentinel{% endblock %}
{% block eyebrow %}Request Error{% endblock %}
{% block heading %}{{ title }}{% endblock %}

{% block content %}
<section class="error-panel">
  <div class="error-code">{{ code }}</div>
  <div>
    <h2>{{ title }}</h2>
    <p class="muted">{{ message }}</p>
    <div class="actions-stack error-actions">
      <a class="button primary" href="{{ url_for('index') }}">Dashboard</a>
      <a class="button secondary" href="{{ url_for('proxy_lab') }}">Proxy Lab</a>
    </div>
  </div>
</section>
{% endblock %}
